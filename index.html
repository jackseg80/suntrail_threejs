<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SunTrail - Moteur Three.js</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="./style.css" rel="stylesheet">
</head>
<body>

<div id="setup-screen">
    <div class="setup-card">
        <h1>⛰️ SunTrail 3D</h1>
        <p style="color:var(--t2); margin-bottom:30px;">Visualisation topographique et simulation solaire.</p>
        <div style="text-align:left; margin-bottom:20px;">
            <label style="font-size:12px; color:var(--gold); text-transform:uppercase;">Clé API MapTiler</label>
            <input type="text" id="k1" placeholder="ex: a1b2c3d4e5f6g7h8" style="width:100%; padding:15px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:12px; color:white; margin-top:8px;">
        </div>
        <p id="serr" style="color:#ef4444; font-size:13px;"></p>
        <button class="btn-go" id="bgo">Lancer l'expérience →</button>
    </div>
</div>

<div id="canvas-container"></div>

<!-- BARRE DE RECHERCHE FLOTTANTE -->
<div id="top-search-container" style="display:none;">
    <input type="text" id="geo-input" placeholder="🔍 Rechercher un lieu...">
    <div id="geo-results"></div>
</div>

<!-- BOUTON CALQUES -->
<div id="layer-btn" style="display:none;" title="Changer de carte">🗺️</div>
<div id="layer-menu">
    <h3 style="margin:0 0 15px 0; font-size:14px; color:var(--gold); text-transform:uppercase;">Type de carte</h3>
    <div class="layer-grid">
        <div class="layer-item active" data-source="swisstopo">
            <div class="layer-thumb" style="background-image:url('https://api.maptiler.com/maps/topo-v2/static/0,0,1/100x100.png?key=')"></div>
            Topo
        </div>
        <div class="layer-item" data-source="satellite">
            <div class="layer-thumb" style="background-image:url('https://api.maptiler.com/maps/satellite/static/0,0,1/100x100.jpg?key=')"></div>
            Satellite
        </div>
        <div class="layer-item" data-source="opentopomap">
            <div class="layer-thumb" style="background-image:url('https://a.tile.opentopomap.org/0/0/0.png')"></div>
            OpenTopo
        </div>
    </div>
    <div style="display:flex; align-items:center; justify-content:space-between; padding-top:10px; border-top:1px solid var(--border);">
        <label style="font-size:13px;">📍 Sentiers & Noms</label>
        <input type="checkbox" id="trails-toggle" checked style="width:20px; height:20px;">
    </div>
</div>

<!-- BOUTON RÉGLAGES -->
<div id="settings-toggle" style="display:none;" title="Réglages techniques">⚙️</div>

<!-- BOUTON GPS -->
<div id="gps-btn" style="display:none;" title="Ma position">🎯</div>

<!-- BARRE DE TEMPS BASSE -->
<div id="bottom-bar" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div style="font-weight:700; font-size:18px;"><span id="time-disp">12:00</span></div>
        <div style="display:flex; gap:10px;">
            <button id="play-btn" style="background:none; border:none; color:white; font-size:18px; cursor:pointer;">▶</button>
            <select id="speed-select" style="background:none; border:none; color:var(--t2); font-size:12px;">
                <option value="1">1x</option>
                <option value="5">5x</option>
                <option value="10">10x</option>
            </select>
        </div>
    </div>
    <input type="range" id="time-slider" min="0" max="1439" value="720">
</div>

<!-- PANNEAU RÉGLAGES (CACHÉ PAR DÉFAUT) -->
<div id="panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h2 style="margin:0; color:var(--gold); font-size:18px;">RÉGLAGES</h2>
        <button id="close-panel" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">×</button>
    </div>

    <div class="control-group">
        <label style="font-size:12px; color:var(--t2); text-transform:uppercase;">Maillage (LOD)</label>
        <div style="display:flex; justify-content:space-between; font-size:14px; margin-bottom:5px;">
            <span>Densité : <span id="res-disp">128</span></span>
            <span>Portée : <span id="range-disp">4</span></span>
        </div>
        <input type="range" id="res-slider" min="32" max="256" step="32" value="128">
        <input type="range" id="range-slider" min="1" max="10" step="1" value="4" style="margin-top:10px;">
    </div>

    <div class="control-group" style="margin-top:25px;">
        <label style="font-size:12px; color:var(--t2); text-transform:uppercase;">Visuel</label>
        <div style="margin:15px 0;">
            <label style="display:flex; justify-content:space-between; font-size:14px;">
                Exagération Relief : <span id="exag-disp">1.4</span>x
            </label>
            <input type="range" id="exag-slider" min="1.0" max="2.0" step="0.1" value="1.4">
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <span style="font-size:14px;">🌑 Ombres 3D</span>
            <input type="checkbox" id="shadow-toggle" checked>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="font-size:14px;">🌫️ Brouillard</span>
            <input type="range" id="fog-slider" min="0" max="80" step="5" value="10" style="width:120px;">
        </div>
    </div>

    <div class="control-group" style="margin-top:25px; border-top:1px solid var(--border); padding-top:20px;">
        <label style="font-size:12px; color:var(--gold); text-transform:uppercase;">Parcours GPX</label>
        <input type="file" id="gpx-upload" accept=".gpx" style="display:none;">
        <button id="gpx-btn" style="width:100%; padding:12px; border-radius:12px; border:1px solid var(--accent); background:rgba(59, 130, 246, 0.1); color:var(--accent); cursor:pointer; font-weight:700; margin:15px 0;">📥 Importer GPX</button>
        <div id="trail-controls" style="display:none;">
             <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <span style="font-size:14px;">🎥 Suivi caméra</span>
                <input type="checkbox" id="trail-follow-toggle">
            </div>
            <div style="background:rgba(255,255,255,0.03); padding:10px; border-radius:10px; font-size:12px;">
                Distance: <span id="gpx-dist" style="color:white; font-weight:700;">0 km</span><br>
                Dénivelé: <span id="gpx-elev" style="color:var(--gold);">+0m / -0m</span>
            </div>
        </div>
    </div>
</div>

<!-- INDICATEURS FIXES -->
<div id="zoom-indicator" style="position:fixed; top:25px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); color:#00ffff; padding:4px 12px; border-radius:20px; font-family:monospace; font-size:11px; z-index:500; border:1px solid rgba(0,255,255,0.2); pointer-events:none;">LVL --</div>

<div id="coords-panel" style="display:none; position:fixed; bottom:100px; left:20px; background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:12px; font-size:13px; z-index:500; backdrop-filter:var(--glass); pointer-events:none; box-shadow:0 5px 15px rgba(0,0,0,0.3);">
    <div id="click-latlon" style="color:var(--t2);">—</div>
    <div id="click-alt" style="color:var(--gold); font-size:16px; font-weight:700;">—</div>
</div>

<script type="module" src="./main.js"></script>
</body>
</html>
