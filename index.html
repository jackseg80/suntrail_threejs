<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SunTrail - Moteur Three.js</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>

<div id="setup-screen">
    <div class="setup-card">
        <div style="margin-bottom:8px; font-size:10px; color:var(--gold); font-weight:700; letter-spacing:3px; text-transform:uppercase;">Version 5.8.1</div>
        <h1>⛰️ SunTrail 3D</h1>
        <p style="color:var(--t2);">Visualisation topographique haute précision, simulation solaire en temps réel & météo experte.</p>
        
        <div style="text-align:left;">
            <label style="font-size:11px; color:var(--gold); text-transform:uppercase; font-weight:700; letter-spacing:1px;">Clé API MapTiler Cloud</label>
            <input type="text" id="k1" placeholder="Collez votre clé ici..." style="width:100%; padding:16px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:14px; color:white; margin-top:10px; font-family:monospace; outline:none;">
            <a href="https://cloud.maptiler.com/account/keys/" target="_blank" class="key-link" style="color:var(--accent); font-size:11px; text-decoration:none; margin-top:8px; display:inline-block;">Obtenir une clé gratuite sur MapTiler.com ↗</a>
        </div>

        <div id="tech-info" style="margin-top:20px; padding:15px; background:rgba(255,255,255,0.03); border-radius:12px; text-align:left; border:1px solid rgba(255,255,255,0.05); display:none;">
            <div style="font-size:9px; color:var(--t2); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;">Diagnostic Matériel</div>
            <div id="diag-gpu" style="font-size:11px; color:white; margin-bottom:4px; font-family:monospace;">GPU: Détection...</div>
            <div id="diag-cpu" style="font-size:11px; color:white; margin-bottom:4px; font-family:monospace;">CPU: -- cores</div>
            <div id="diag-preset" style="font-size:11px; color:var(--gold); font-weight:700; font-family:monospace;">PROFIL: --</div>
        </div>

        <p id="serr" style="color:#ef4444; font-size:13px; margin-top:15px; min-height:20px;"></p>
        
        <button class="btn-go" id="bgo">Lancer l'expérience</button>
    </div>
</div>

<div id="canvas-container"></div>

<!-- SHELL CONTAINERS -->
<div id="top-status-bar"></div>
<nav id="nav-bar"></nav>
<div id="sheet-overlay"></div>
<div id="sheet-container"></div>
<div id="toast-container"></div>
<div id="gps-main-btn" style="display:none;" title="Ma position">🎯</div>

<!-- TEMPLATES UI -->
<template id="template-layers">
<div id="layers" class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
        <span class="sheet-title">Type de carte</span>
        <div class="sheet-close" id="close-layers">×</div>
    </div>
    <div class="layer-grid">
        <div class="layer-item active" data-source="swisstopo">
            <div class="layer-thumb" style="background-image:url('https://cloud.maptiler.com/static/img/maps/outdoor-v2.png')"></div>
            Topo CH
        </div>
        <div class="layer-item" data-source="satellite">
            <div class="layer-thumb" style="background-image:url('https://cloud.maptiler.com/static/img/maps/satellite.png')"></div>
            Satellite
        </div>
        <div class="layer-item" data-source="opentopomap">
            <div class="layer-thumb" style="background-image:url('https://cloud.maptiler.com/static/img/maps/topo.png')"></div>
            OpenTopo
        </div>
    </div>
    <div style="margin-top:20px; padding-top:20px; border-top:1px solid var(--border);">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:15px;">
            <label style="font-size:14px;">📍 Sentiers de randonnée</label>
            <input type="checkbox" id="layers-trails-toggle">
        </div>
        <div style="display:flex; align-items:center; justify-content:space-between;">
            <label style="font-size:14px;">⚠️ Pentes > 30° (Avalanche)</label>
            <input type="checkbox" id="layers-slopes-toggle">
        </div>
    </div>
</div>
</template>

<template id="template-search">
<div id="search" class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
        <span class="sheet-title">Recherche</span>
        <div class="sheet-close" id="close-search">×</div>
    </div>
    <input type="text" id="geo-input" placeholder="🔍 Rechercher un lieu ou sommet...">
    <div id="geo-results"></div>
</div>
</template>

<template id="template-settings">
<div id="settings" class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
        <h2 style="margin:0; color:var(--gold); font-size:18px;">RÉGLAGES</h2>
        <button id="close-panel" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">&times;</button>
    </div>
    
    <div class="control-group">
        <label style="display:block; font-size:11px; color:var(--gold); font-weight:700; margin-bottom:10px; text-transform:uppercase;">Profil de performance</label>
        <div class="preset-grid">
            <button class="preset-btn" data-preset="eco">Éco</button>
            <button class="preset-btn" data-preset="balanced">Std</button>
            <button class="preset-btn" data-preset="performance">High</button>
            <button class="preset-btn" data-preset="ultra">Ultra</button>
        </div>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; padding:12px; background:rgba(255,255,255,0.03); border-radius:12px; border:1px solid rgba(255,255,255,0.05);">
        <span style="font-size:13px; color:white; font-weight:500;">🔋 Économie d'énergie (30 FPS)</span>
        <input type="checkbox" id="energy-saver-toggle">
    </div>

    <div class="control-group">
        <label style="display:block; font-size:11px; color:var(--gold); font-weight:700; margin-bottom:15px; text-transform:uppercase;">Rendu 3D & Détails</label>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <span style="font-size:14px;">📊 Stats de performance</span>
            <input type="checkbox" id="stats-toggle" checked>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <span style="font-size:14px;">🛠️ Infos de navigation</span>
            <input type="checkbox" id="debug-toggle" checked>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <span style="font-size:14px;">🌲 Forêts 3D (Suisse) <span id="veg-density-disp">4000</span></span>
            <input type="checkbox" id="veg-toggle" checked>
        </div>
        <input type="range" id="veg-density-slider" min="0" max="15000" step="500" value="4000" style="margin-bottom:15px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <span style="font-size:14px;">🏢 Bâtiments OSM</span>
            <input type="checkbox" id="buildings-toggle" checked>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <span style="font-size:14px;">💧 Hydrologie (Lacs & Rivières)</span>
            <input type="checkbox" id="hydro-toggle" checked>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="font-size:14px;">🪧 Signalisation 3D</span>
            <input type="checkbox" id="poi-toggle" checked>
        </div>
    </div>

    <details class="control-group" style="margin-top: 15px;">
        <summary style="font-size:11px; color:var(--gold); font-weight:700; text-transform:uppercase; cursor:pointer; outline:none;">Paramètres Avancés</summary>
        <div style="margin-top: 15px; display: flex; flex-direction: column; gap: 15px;">
            <div>
                <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px;">
                    <span>Résolution (LOD)</span>
                    <span id="res-disp">14</span>
                </div>
                <input type="range" id="res-slider" min="10" max="16" step="1" value="14">
            </div>
            <div>
                <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px;">
                    <span>Rayon de rendu</span>
                    <span id="range-disp">3</span>
                </div>
                <input type="range" id="range-slider" min="1" max="8" step="1" value="3">
            </div>
            <div>
                <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px;">
                    <span>Exagération du relief</span>
                    <span id="exag-disp">1</span>
                </div>
                <input type="range" id="exag-slider" min="1" max="3" step="0.1" value="1">
            </div>
            <div>
                <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px;">
                    <span>Brouillard (km)</span>
                </div>
                <input type="range" id="fog-slider" min="5" max="100" step="1" value="30">
            </div>
            <div>
                <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px;">
                    <span>Vitesse de chargement</span>
                </div>
                <select id="load-speed-select" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:white; padding:8px; border-radius:8px;">
                    <option value="0.5">Rapide (0.5x)</option>
                    <option value="1" selected>Normal (1x)</option>
                    <option value="2">Lent (2x)</option>
                </select>
            </div>
            <div>
                <div style="font-size:13px; margin-bottom:5px;">Clé API MapTiler</div>
                <form id="api-key-form" style="display:flex; gap:8px;">
                    <input type="text" id="maptiler-key-input" placeholder="Clé API..." style="flex:1; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:white; padding:8px; border-radius:8px;">
                    <button type="submit" class="btn-go" style="margin:0; padding:8px 12px;">OK</button>
                </form>
            </div>
            <div>
                <div style="font-size:13px; margin-bottom:5px;">Stockage & Hors-ligne</div>
                <div style="display:flex; gap:8px; flex-wrap:wrap;">
                    <button id="clear-cache-btn" class="btn-go" style="margin:0; padding:8px 12px; background:#ef4444; flex:1;">Vider Cache</button>
                    <button id="download-zone-btn" class="btn-go" style="margin:0; padding:8px 12px; flex:1;"><span>Télécharger Zone</span></button>
                </div>
            </div>
            <div>
                <div style="font-size:13px; margin-bottom:5px;">Cartes Locales (PMTiles)</div>
                <button id="pmtiles-btn" class="btn-go" style="margin:0; padding:8px 12px; width:100%;">Charger .pmtiles</button>
                <input type="file" id="pmtiles-upload" accept=".pmtiles" style="display:none;">
            </div>
        </div>
    </details>
</div>
</template>

<template id="template-weather">
<div id="weather" class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
        <h3 style="margin:0; font-size:14px; color:var(--gold); text-transform:uppercase; letter-spacing:1px;">☁️ Bulletin Météo</h3>
        <button id="close-weather" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">&times;</button>
    </div>
    <div id="weather-content"></div>
    
    <div style="margin-top:15px; padding-top:15px; border-top:1px solid var(--border);">
        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; margin-bottom:15px;">
            <button class="weather-btn" data-weather="clear" style="background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:8px; padding:8px; cursor:pointer;">☀️</button>
            <button class="weather-btn" data-weather="rain" style="background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:8px; padding:8px; cursor:pointer;">🌧️</button>
            <button class="weather-btn" data-weather="snow" style="background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:8px; padding:8px; cursor:pointer;">❄️</button>
        </div>
        
        <div style="margin-bottom:10px;">
            <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px;">
                <span>Intensité : <span id="weather-density-disp">2500</span></span>
            </div>
            <input type="range" id="weather-density-slider" min="0" max="15000" step="500" value="2500">
        </div>
        <div>
            <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px;">
                <span>Vitesse : <span id="weather-speed-disp">1.0</span>x</span>
            </div>
            <input type="range" id="weather-speed-slider" min="0.5" max="3.0" step="0.1" value="1.0">
        </div>
    </div>

    <button id="open-expert-weather" class="btn-go" style="margin-top:5px; padding:12px;">📊 Station Météo Expert</button>
</div>
</template>

<template id="template-solar-probe">
<div id="solar-probe" class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
        <h3 style="margin:0; font-size:14px; color:var(--gold); text-transform:uppercase;">☀️ Analyse Solaire</h3>
        <button id="close-probe" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">&times;</button>
    </div>
    <div id="probe-content"></div>
</div>
</template>

<template id="template-sos">
<div id="sos" class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div style="text-align:center; padding:20px;">
        <div style="font-size:48px; margin-bottom:15px;">🆘</div>
        <h2 style="color:#ef4444; margin:0 0 10px 0;">URGENCE SOS</h2>
        <p style="font-size:13px; color:var(--t2); margin-bottom:20px;">Voici vos coordonnées exactes à transmettre aux secours.</p>
        <div id="sos-text-container" style="background:rgba(239,68,68,0.1); border:1px solid #ef4444; border-radius:16px; padding:20px; font-family:monospace; font-size:16px; color:white; margin-bottom:20px; word-break:break-all;">
            ⌛ Localisation en cours...
        </div>
        <div style="display:flex; gap:10px;">
            <button id="sos-copy-btn" class="btn-go" style="flex:1; margin:0; background:#444;">Copier le message</button>
            <button id="sos-close-btn" class="btn-go" style="flex:1; margin:0; background:#ef4444;">Fermer</button>
        </div>
    </div>
</div>
</template>

<template id="template-widgets">
<div id="widgets-container" style="display:none;">
    <div id="layer-btn" style="display:none;" title="Changer de carte">🗺️</div>
    <div id="layer-menu">
        <h3 style="margin:0 0 15px 0; font-size:14px; color:var(--gold); text-transform:uppercase;">Type de carte</h3>
        <div class="layer-grid">
            <div class="layer-item active" data-source="swisstopo">
                <div class="layer-thumb" style="background-image:url('https://cloud.maptiler.com/static/img/maps/outdoor-v2.png')"></div>
                Topo CH
            </div>
            <div class="layer-item" data-source="satellite">
                <div class="layer-thumb" style="background-image:url('https://cloud.maptiler.com/static/img/maps/satellite.png')"></div>
                Satellite
            </div>
            <div class="layer-item" data-source="opentopomap">
                <div class="layer-thumb" style="background-image:url('https://cloud.maptiler.com/static/img/maps/topo.png')"></div>
                OpenTopo
            </div>
        </div>
        <div style="display:flex; align-items:center; justify-content:space-between; padding-top:10px; border-top:1px solid var(--border);">
            <label style="font-size:13px;">📍 Sentiers</label>
            <input type="checkbox" id="trails-toggle" checked>
        </div>
        <div style="display:flex; align-items:center; justify-content:space-between; padding-top:10px;">
            <label style="font-size:13px;">⚠️ Pentes > 30°</label>
            <input type="checkbox" id="slopes-toggle">
        </div>
    </div>
    <div id="bottom-stack">
        <div id="coords-panel" style="display:none;">
            <div id="close-coords" style="position:absolute; top:8px; right:12px; cursor:pointer; color:var(--text-2); font-size:16px; font-weight:bold;">×</div>
            <div id="click-latlon" style="color:var(--text-2); font-size:11px;">—</div>
            <div id="click-alt" style="color:white; font-size:18px; font-weight:800; margin-top:2px;">—</div>
            <div style="display:flex; gap:8px; margin-top:10px; pointer-events:auto;">
                <button id="probe-btn" style="flex:2; padding:10px; border-radius:10px; background:var(--accent); color:white; border:none; font-weight:700; cursor:pointer; font-size:11px; pointer-events:auto;">☀️ ANALYSE SOLAIRE</button>
                <button id="sos-btn" style="flex:1; padding:10px; border-radius:10px; background:#ef4444; color:white; border:none; font-weight:700; cursor:pointer; font-size:11px; box-shadow:0 4px 12px rgba(239, 68, 68, 0.3); pointer-events:auto;">🆘 SOS</button>
            </div>
        </div>
        <div id="bottom-bar" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="display:flex; align-items:center; gap:12px;">
                    <div style="font-weight:700; font-size:18px;"><span id="time-disp">12:00</span></div>
                    <div id="sun-phase" style="font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-left:5px;">☀️ Plein jour</div>
                    <input type="date" id="date-input" style="background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3); color:white !important; font-size:12px; padding:8px 12px; border-radius:10px; cursor:pointer; color-scheme: dark; font-family: inherit; -webkit-appearance: none; display: flex; align-items: center; min-height: 35px;">
                </div>
                <div style="display:flex; gap:10px;">
                    <button id="play-btn" style="background:none; border:none; color:white; font-size:18px; cursor:pointer;">▶</button>
                    <select id="speed-select" style="background:none; border:none; color:var(--text-2); font-size:12px;">
                        <option value="1">1x</option>
                        <option value="5">5x</option>
                        <option value="10">10x</option>
                    </select>
                </div>
            </div>
            <input type="range" id="time-slider" min="0" max="1439" value="720">
        </div>
    </div>
    <div id="elevation-profile" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <h3 style="margin:0; font-size:12px; color:var(--gold); text-transform:uppercase; letter-spacing:2px;">📈 Profil d'élévation & Pentes</h3>
            <div style="display:flex; align-items:center; gap:15px;">
                <div id="profile-info" style="font-size:11px; color:var(--text-2); font-family:monospace;">Distance : 0km | Alt : 0m | Pente : 0%</div>
                <button id="close-profile" style="background:rgba(255,255,255,0.05); border:1px solid var(--border); color:white; width:24px; height:24px; border-radius:50%; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center;">&times;</button>
            </div>
        </div>
        <div id="profile-chart-container" style="position:relative; width:100%; height:80px; background:rgba(255,255,255,0.02); border-radius:12px; overflow:hidden; cursor:crosshair; border:1px solid rgba(255,255,255,0.05);">
            <svg id="profile-svg" style="width:100%; height:100%;"></svg>
            <div id="profile-cursor" style="display:none; position:absolute; top:0; height:100%; width:2px; background:cyan; pointer-events:none; box-shadow:0 0 10px cyan;"></div>
        </div>
    </div>
</div>
</template>

<template id="template-top-status-bar">
    <div class="top-status-bar-content">
        <div class="status-widget lod-widget">
            <span class="lod-badge">LVL --</span>
        </div>
        <div class="status-widget weather-widget">
            <span class="weather-icon">☀️</span>
            <span class="weather-temp">--°C</span>
        </div>
        <div class="status-widget timeline-toggle-widget" id="timeline-toggle-btn">
            <span class="timeline-icon">🕒</span>
        </div>
        <div class="status-widget network-widget">
            <span class="network-status">📡</span>
        </div>
    </div>
</template>

<template id="template-nav-bar">
    <div class="nav-bar-content">
        <div class="nav-tab active" data-tab="map">
            <div class="nav-icon">🗺️</div>
            <span class="nav-label">Carte</span>
        </div>
        <div class="nav-tab" data-tab="search">
            <div class="nav-icon">🔍</div>
            <span class="nav-label">Recherche</span>
        </div>
        <div class="nav-tab" data-tab="track">
            <div class="nav-icon">📈</div>
            <span class="nav-label">Parcours</span>
        </div>
        <div class="nav-tab" data-tab="settings">
            <div class="nav-icon">⚙️</div>
            <span class="nav-label">Réglages</span>
        </div>
    </div>
</template>

<template id="template-track">
<div id="track" class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
        <span class="sheet-title">Parcours</span>
        <div class="sheet-close" id="close-track">×</div>
    </div>
    <div class="track-stats">
        <div class="stat-card">
            <div class="stat-card-label">Distance</div>
            <div class="stat-card-value" id="track-dist">0.0 <span style="font-size:13px;color:var(--t2)">km</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-card-label">Points</div>
            <div class="stat-card-value" id="track-points">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-card-label">Dénivelé +</div>
            <div class="stat-card-value green" id="track-dplus">+0 <span style="font-size:12px">m</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-card-label">Dénivelé −</div>
            <div class="stat-card-value red" id="track-dminus">−0 <span style="font-size:12px">m</span></div>
        </div>
    </div>
    <div class="track-actions">
        <button class="track-btn rec" id="rec-btn-sheet">
            <span class="rec-icon">🔴</span> REC
        </button>
        <button class="track-btn secondary" id="import-gpx-sheet">
            📥 Import GPX
        </button>
        <button class="track-btn secondary" id="export-gpx-sheet">
            📤 Exporter
