<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SunTrail - Moteur Three.js (Shadowmap Clone)</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="./style.css" rel="stylesheet">
</head>
<body>

<div id="setup-screen">
    <div class="setup-card">
        <h1>⛰️ SunTrail V10 (Three.js)</h1>
        <p class="sub">Le moteur ultime avec de vraies ombres 3D polygonales.</p>
        <div class="fg">
            <label>Clé API MapTiler</label>
            <input type="text" id="k1" placeholder="ex: a1b2c3d4e5f6g7h8" autocomplete="off" spellcheck="false">
        </div>
        <p class="setup-error" id="serr"></p>
        <button class="btn-go" id="bgo">Charger le relief 3D →</button>
    </div>
</div>

<div id="canvas-container"></div>

<div id="panel" style="display:none;">
    <h2>☀️ SunTrail 3D</h2>
    
    <div class="control-group" style="position:relative; margin-bottom: 1rem;">
        <input type="text" id="geo-input" placeholder="🔍 Rechercher un sommet, une ville..." autocomplete="off" style="width:100%; padding:0.6rem; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:8px; color:white; font-size:0.85rem;">
        <div id="geo-results" style="display:none; position:absolute; top:100%; left:0; right:0; background:var(--panel); border:1px solid var(--border); border-radius:8px; z-index:100; max-height:200px; overflow-y:auto;"></div>
    </div>

    <div class="info">Clic gauche : Glisser. Clic droit : Tourner. Molette : Zoomer.</div>
    
    <div class="control-group">
        <label>Heure de la journée : <span id="time-disp">12:00</span></label>
        <input type="range" id="time-slider" min="0" max="1439" value="720">
    </div>
    
    <div class="stats">
        <div>Azimut: <span id="az-disp">—</span>°</div>
        <div>Élévation: <span id="alt-disp">—</span>°</div>
    </div>
</div>

<script type="module" src="./main.js"></script>
</body>
</html>
