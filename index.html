<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="referrer" content="same-origin">
    <meta name="description" content="SunTrail 3D — Carte topographique 3D interactive pour la randonnée. Terrain réaliste, GPS, météo, analyse solaire et tracés GPX.">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SunTrail 3D">
    <title>SunTrail - Moteur Three.js</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap">
    <link rel="stylesheet" href="/src/style.css">
</head>
<body id="body">

<a href="#canvas-container" class="skip-link" data-i18n="a11y.skipToContent">Aller au contenu</a>
<h1 class="sr-only">SunTrail - Carte 3D</h1>

<!-- Indicateur de chargement des tuiles réseau -->
<div id="tile-loading-bar" aria-hidden="true"></div>

<!-- Overlay de chargement de la carte — bloqué tant que le moteur n'est pas prêt -->
<div id="map-loading-overlay">
    <span class="spinner map-loading-spinner"></span>
    <span class="map-loading-text" data-i18n="loading.map">Chargement de la carte...</span>
    <div id="map-loading-offline-msg" style="display:none;">
        <span data-i18n="network.overlay.title">Pas de connexion</span>
        <span class="map-loading-offline-sub" data-i18n="network.overlay.subtitle">La carte sera chargée depuis le cache si disponible</span>   
    </div>
</div>

<main>
    <div id="canvas-container">
        <!-- Le canvas sera injecté ici par initScene() -->
    </div>
</main>

<header>
    <div id="top-status-bar"></div>
</header>

<!-- COORDS PILL -->
<div id="coords-pill" class="hidden">
  <div class="coords-lat" id="click-latlon">—</div>
  <div class="coords-alt" id="click-alt">—</div>
  <div class="coords-poi" id="click-poi-name" style="display:none;"></div>
  <div class="coords-actions">
        <button class="coords-btn solar" id="probe-btn" data-i18n="coords.solar">☀️ Solaire</button>
        <button class="coords-btn sos" id="sos-btn-pill" style="display:none;">SOS</button>
  </div>
</div>

<div id="zoom-indicator" style="display:none;">LOD --</div>

<nav id="nav-bar"></nav>

<div id="sheet-overlay"></div>
<div id="sheet-container"></div>
<div id="toast-container"></div>

<!-- ROUTE BAR — mini-panneau persistant planificateur d'itinéraire -->
<div id="route-bar" role="region" aria-label="Planificateur d'itinéraire">
  <div class="rb-dots" id="rb-dots" aria-hidden="true"></div>
  <div class="rb-info" id="rb-info" aria-live="polite"></div>
  <button class="rb-btn" id="rb-settings-btn" aria-label="Réglages de l'itinéraire">⚙</button>
  <button class="rb-btn rb-btn-danger" id="rb-clear-btn" aria-label="Effacer l'itinéraire">✕</button>
</div>

<!-- Panel réglages itinéraire (profil · boucle · clé ORS · waypoints) -->
<div id="route-settings" class="route-settings-panel hidden" role="dialog" aria-label="Réglages itinéraire">
  <!-- Profil + boucle sur la même ligne -->
  <div class="rs-row">
    <select id="rs-profile" class="rs-profile-select">
      <option value="foot-hiking">🥾 Randonnée</option>
      <option value="foot-walking">🚶 Marche</option>
      <option value="cycling-regular">🚴 Vélo</option>
      <option value="cycling-mountain">🚵 VTT</option>
    </select>
    <input type="checkbox" id="rs-loop" class="rs-hidden-check">
    <label class="rs-loop-btn" for="rs-loop">↻ Boucle</label>
  </div>
  <!-- Clé ORS -->
  <div class="rs-row rs-key-row">
    <span>🔑</span>
    <input id="rs-ors-key" type="password" autocomplete="off" placeholder="Clé ORS (optionnel)">
    <button id="rs-save-key">✓</button>
  </div>
  <div class="rs-key-hint">
    <a href="https://openrouteservice.org/dev/#/signup" target="_blank" rel="noopener">Obtenir une clé gratuite →</a>
  </div>
  <!-- Liste des waypoints -->
  <div id="rs-waypoints-list" class="rs-waypoints-list"></div>
</div>

<!-- Indicateur visuel long-press -->
<div id="lp-indicator" aria-hidden="true">
  <svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
    <circle cx="22" cy="22" r="18" fill="none"
      stroke="var(--accent, #f97316)" stroke-width="3"
      stroke-dasharray="113" stroke-dashoffset="113"
      id="lp-circle"/>
  </svg>
</div>

<!-- PILE DE BOUTONS FLOTTANTS -->
<div class="fab-stack">
  <!-- BOUSSOLE -->
  <div id="compass-fab" class="fab-btn" role="button" tabindex="0" aria-label="Réinitialiser le Nord" data-i18n-aria-label="a11y.resetNorth">   
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" id="compass-svg">
      <path d="M12 2L15 12L12 22L9 12L12 2Z" fill="#ef4444" stroke="#ef4444" stroke-width="1"/>
      <path d="M12 2L15 12H9L12 2Z" fill="#ef4444"/>
      <circle cx="12" cy="12" r="1" fill="white"/>
    </svg>
  </div>

  <!-- POSITION -->
  <div id="gps-main-btn" class="fab-btn" role="button" tabindex="0" aria-label="Ma position" data-i18n-aria-label="a11y.myLocation">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
      <circle cx="12" cy="10" r="3"/>
    </svg>
  </div>

  <!-- COUCHES -->
  <div id="layers-fab" class="fab-btn" role="button" tabindex="0" aria-label="Fonds de carte" data-i18n-aria-label="a11y.mapLayers">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="12 2 2 7 12 12 22 7 12 2"/>
      <polyline points="2 17 12 22 22 17"/>
      <polyline points="2 12 12 17 22 12"/>
    </svg>
  </div>

  <!-- MODE 2D/3D -->
  <button class="fab-btn nav-mode-toggle" id="nav-2d-toggle" aria-label="Basculer 2D/3D" data-i18n-aria-label="a11y.toggle2d3d" aria-pressed="false" style="flex-direction:column; gap:1px; padding:2px;">
      <svg class="mode-icon mode-icon-3d" width="18" height="18" viewBox="0 0 24 24" fill="none" style="flex-shrink:0;">
        <path d="M12 3L20 7.5L12 12L4 7.5L12 3Z" fill="currentColor" opacity="0.15" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M4 7.5V16.5L12 21" fill="currentColor" opacity="0.05" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M20 7.5V16.5L12 21" fill="currentColor" opacity="0.1" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <line x1="12" y1="12" x2="12" y2="21" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <svg class="mode-icon mode-icon-2d" width="18" height="18" viewBox="0 0 24 24" fill="none" style="flex-shrink:0;">
        <rect x="4" y="4" width="16" height="16" rx="2.5" stroke="currentColor" stroke-width="1.5"/>
        <line x1="4" y1="10" x2="20" y2="10" stroke="currentColor" stroke-width="1" opacity="0.35"/>
        <line x1="4" y1="16" x2="20" y2="16" stroke="currentColor" stroke-width="1" opacity="0.35"/>
        <line x1="10" y1="4" x2="10" y2="20" stroke="currentColor" stroke-width="1" opacity="0.35"/>
        <line x1="16" y1="4" x2="16" y2="20" stroke="currentColor" stroke-width="1" opacity="0.35"/>
      </svg>
      <span class="nav-mode-label" style="font-size:9px; font-weight:600; line-height:1; margin-top:1px;">3D</span>
  </button>
</div>

<!-- Widgets conteneur (Timebar, Profil) -->
<div id="widgets-container"></div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
