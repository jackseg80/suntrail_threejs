<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="description" content="SunTrail 3D — Carte topographique 3D interactive pour la randonnée. Terrain réaliste, GPS, météo, analyse solaire et tracés GPX.">
    <!-- PWA installable (Android Chrome) — remplace apple-mobile-web-app-capable déprécié sur Chrome -->
    <meta name="mobile-web-app-capable" content="yes">
    <!-- iOS PWA (W3) — toujours requis pour iOS Safari (status bar + titre) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SunTrail 3D">
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: blob:
            https://cloud.maptiler.com;
        connect-src 'self'
            https://*.maptiler.com
            https://*.geo.admin.ch
            https://*.geopf.fr
            https://*.openstreetmap.org
            https://overpass-api.de
            https://*.overpass-api.de
            https://overpass.kumi.systems
            https://api.open-meteo.com
            https://*.tile.opentopomap.org
            https://gist.githubusercontent.com;
        worker-src 'self' blob:;
        media-src 'none';
        object-src 'none';
    ">
    <title>SunTrail - Moteur Three.js</title>
    <!-- Préconnexion Google Fonts (réduit la latence DNS) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Chargement asynchrone des fonts (non-bloquant pour LCP) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap"></noscript>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>

<div id="setup-screen">
    <div class="setup-card">
        <div style="margin-bottom:8px; font-size:10px; color:var(--gold); font-weight:700; letter-spacing:3px; text-transform:uppercase;">Version 5.11.1</div>
        <h1>⛰️ SunTrail 3D</h1>
        <p style="color:var(--text-2);">Visualisation topographique haute précision, simulation solaire en temps réel & météo experte.</p>
        
        <div style="text-align:left;">
            <label style="font-size:11px; color:var(--gold); text-transform:uppercase; font-weight:700; letter-spacing:1px;">Clé API MapTiler Cloud</label>
            <input type="text" id="k1" placeholder="Collez votre clé ici..." style="width:100%; padding:16px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:14px; color:white; margin-top:10px; font-family:monospace; outline:none;">
            <a href="https://cloud.maptiler.com/account/keys/" target="_blank" class="key-link" style="color:var(--accent); font-size:11px; text-decoration:none; margin-top:8px; display:inline-block;">Obtenir une clé gratuite sur MapTiler.com ↗</a>
        </div>

        <div id="tech-info" style="margin-top:20px; padding:15px; background:rgba(255,255,255,0.03); border-radius:12px; text-align:left; border:1px solid rgba(255,255,255,0.05); display:none;">
            <div style="font-size:9px; color:var(--text-2); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;">Diagnostic Matériel</div>
            <div id="diag-gpu" style="font-size:11px; color:white; margin-bottom:4px; font-family:monospace;">GPU: Détection...</div>
            <div id="diag-cpu" style="font-size:11px; color:white; margin-bottom:4px; font-family:monospace;">CPU: -- cores</div>
            <div id="diag-preset" style="font-size:11px; color:var(--gold); font-weight:700; font-family:monospace;">PROFIL: --</div>
        </div>

        <p id="serr" style="color:#ef4444; font-size:13px; margin-top:15px; min-height:20px;"></p>
        
        <button class="btn-go" id="bgo">Lancer l'expérience</button>
    </div>
</div>

<!-- Overlay de chargement de la carte — visible après le setup-screen, caché quand les 1ères tuiles arrivent -->
<!-- Indicateur de chargement des tuiles réseau (barre fine, 600ms debounce) -->
<div id="tile-loading-bar" aria-hidden="true"></div>

<div id="map-loading-overlay">
    <span class="spinner map-loading-spinner"></span>
    <span class="map-loading-text" data-i18n="loading.map">Chargement de la carte...</span>
</div>

<div id="canvas-container"></div>

<!-- SHELL CONTAINERS -->
<div id="top-status-bar"></div>

<!-- COORDS PILL -->
<div id="coords-pill" class="hidden">
  <div class="coords-lat" id="click-latlon">—</div>
  <div class="coords-alt" id="click-alt">—</div>
  <div class="coords-actions">
        <button class="coords-btn solar" id="probe-btn" data-i18n="coords.solar">☀ Solaire</button>
  </div>
</div>

<nav id="nav-bar"></nav>
<div id="sheet-overlay"></div>
<div id="sheet-container"></div>
<div id="toast-container"></div>

<!-- PILE DE BOUTONS FLOTTANTS (STYLE GOOGLE MAPS / SWISSMOBILE) -->
<div class="fab-stack">
  <!-- BOUSSOLE -->
  <div id="compass-fab" class="fab-btn" role="button" tabindex="0" aria-label="Réinitialiser le Nord">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" id="compass-svg">
      <path d="M12 2L15 12L12 22L9 12L12 2Z" fill="#ef4444" stroke="#ef4444" stroke-width="1"/>
      <path d="M12 2L15 12H9L12 2Z" fill="#ef4444"/>
      <circle cx="12" cy="12" r="1" fill="white"/>
    </svg>
  </div>

  <!-- COUCHES -->
  <div id="layers-fab" class="fab-btn" role="button" tabindex="0" aria-label="Changer le type de carte">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="12 2 2 7 12 12 22 7 12 2"/>
      <polyline points="2 17 12 22 22 17"/>
      <polyline points="2 12 12 17 22 12"/>
    </svg>
  </div>

  <!-- GPS -->
  <div id="gps-main-btn" class="fab-btn primary" role="button" tabindex="0" aria-label="Localiser ma position">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <circle cx="11" cy="11" r="3.5" stroke="white" stroke-width="1.8"/>
      <path d="M11 2v3M11 17v3M2 11h3M17 11h3" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="11" cy="11" r="7" stroke="white" stroke-width="1.2" stroke-dasharray="2 2" opacity="0.5"/>
    </svg>
  </div>

  <!-- TOGGLE 2D/3D — déplacé en bas de la stack avec labels texte -->
  <button class="fab-btn nav-mode-toggle" id="nav-2d-toggle" aria-label="Basculer 2D/3D" aria-pressed="false" style="flex-direction:column; gap:1px; padding:2px;">
    <svg class="grid-icon" width="18" height="18" viewBox="0 0 22 22" fill="none" style="flex-shrink:0;">
      <line x1="2" y1="6"  x2="20" y2="6"  stroke="currentColor" stroke-width="1.0" opacity="0.35"/>
      <line x1="2" y1="11" x2="20" y2="11" stroke="currentColor" stroke-width="1.2"/>
      <line x1="2" y1="16" x2="20" y2="16" stroke="currentColor" stroke-width="1.0" opacity="0.35"/>
      <line x1="5"  y1="3" x2="5"  y2="19" stroke="currentColor" stroke-width="1.0" opacity="0.35"/>
      <line x1="11" y1="3" x2="11" y2="19" stroke="currentColor" stroke-width="1.2"/>
      <line x1="17" y1="3" x2="17" y2="19" stroke="currentColor" stroke-width="1.0" opacity="0.35"/>
      <path class="grid-peak" d="M7 11 L11 5 L15 11" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
    </svg>
    <span class="nav-mode-label" style="font-size:9px; font-weight:600; line-height:1; margin-top:1px;">3D</span>
  </button>
</div>

<!-- TEMPLATES UI -->
<template id="template-layers">
<div id="layers-sheet" class="bottom-sheet">
    <div class="sheet-drag-handle" aria-hidden="true"><div class="sheet-drag-indicator"></div></div>
    <div class="sheet-header">
        <span id="layers-sheet-title" class="sheet-title" data-i18n="layers.title">Fonds de carte</span>
        <div class="sheet-close" id="close-layers">×</div>
    </div>
    
    <div class="layer-grid" role="listbox" aria-labelledby="layers-sheet-title">
        <div class="layer-item active" data-source="swisstopo" role="option" aria-selected="true">
            <div class="layer-thumb" style="background-image:url('/img/maps/outdoor-v2.png')"></div>
            <div class="layer-name" data-i18n="layers.source.swisstopo">Topo CH</div>
        </div>
        <div class="layer-item" data-source="satellite" role="option" aria-selected="false">
            <div class="layer-thumb" style="background-image:url('/img/maps/satellite.png')">
                <div class="layer-pro-badge" aria-hidden="true">Pro</div>
            </div>
            <div class="layer-name" data-i18n="layers.source.satellite">Satellite</div>
        </div>
        <div class="layer-item" data-source="opentopomap" role="option" aria-selected="false">
            <div class="layer-thumb" style="background-image:url('/img/maps/topo.png')"></div>
            <div class="layer-name" data-i18n="layers.source.topo">OpenTopo</div>
        </div>
    </div>

    <div class="settings-section" style="padding-top: 15px; margin-top: 15px; border-top: 1px solid var(--border);">
        <div class="setting-row" id="row-trails" style="padding: 10px 0;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="icon-btn-sm" style="width:30px; height:30px; background: rgba(59,126,248,0.1); color: var(--accent); border: none;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
                </div>
                <div>
                    <div class="setting-label" data-i18n="layers.overlay.trails">Sentiers</div>
                    <div class="lod-warning" style="display:none; font-size:9px; color:var(--text-3); margin-top:1px;" data-i18n="layers.overlay.trailsUnavailable">Indisponible à ce zoom</div>
                </div>
            </div>
            <div style="display: flex; align-items: center; gap: 8px;">
                <div class="info-icon" title="Zoomer d'avantage (LVL 11+) pour voir les sentiers">ⓘ</div>
                <input type="checkbox" id="layers-trails-toggle" checked aria-label="Sentiers">
            </div>
        </div>
        <div class="setting-row" id="row-slopes" style="padding: 10px 0;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="icon-btn-sm" style="width:30px; height:30px; background: rgba(239,68,68,0.1); color: var(--danger); border: none;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><path d="M12 9v4"></path><path d="M12 17h.01"></path></svg>
                </div>
                <div>
                    <div class="setting-label" data-i18n="layers.overlay.slopes">Pentes > 30°</div>
                    <div class="lod-warning" style="display:none; font-size:9px; color:var(--text-3); margin-top:1px;" data-i18n="layers.overlay.slopesUnavailable">Indisponible à ce zoom</div>
                </div>
            </div>
            <div style="display: flex; align-items: center; gap: 8px;">
                <div class="info-icon" title="Zoomer d'avantage (LVL 11+) pour voir les pentes">ⓘ</div>
                <input type="checkbox" id="layers-slopes-toggle" aria-label="Pentes > 30°">
            </div>
        </div>
    </div>
</div>
</template>

<template id="template-search">
<div id="search" class="bottom-sheet">
    <div class="sheet-drag-handle" aria-hidden="true"><div class="sheet-drag-indicator"></div></div>
    <div class="sheet-header">
        <span class="sheet-title" data-i18n="search.title">Exploration</span>
        <div class="sheet-close" id="close-search">×</div>
    </div>
    <div style="padding: 0 0 10px;">
        <div class="search-input-wrap">
          <span class="search-icon">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <circle cx="7" cy="7" r="4.5" stroke="rgba(139,143,168,0.6)" stroke-width="1.3"/>
              <path d="M10.5 10.5l3 3" stroke="rgba(139,143,168,0.6)" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
          </span>
          <input type="text" id="geo-input" placeholder="Chercher un sommet ou un lieu...">
        </div>
    </div>
    <div id="geo-results" role="listbox" aria-label="Résultats de recherche" aria-live="polite"></div>
</div>
</template>

<template id="template-settings">
<div id="settings" class="bottom-sheet">
    <div class="sheet-drag-handle" aria-hidden="true"><div class="sheet-drag-indicator"></div></div>
    <div class="sheet-header">
        <span class="sheet-title" data-i18n="settings.title">Réglages</span>
        <div class="sheet-close" id="close-panel">×</div>
    </div>
    
    <div class="section-label" data-i18n="settings.section.presets">Profil de performance</div>
    <div class="preset-grid">
        <button class="preset-btn" data-preset="eco" data-i18n="settings.preset.eco">Éco</button>
        <button class="preset-btn" data-preset="balanced" data-i18n="settings.preset.balanced">Std</button>
        <button class="preset-btn" data-preset="performance" data-i18n="settings.preset.performance">High</button>
        <button class="preset-btn" data-preset="ultra" data-i18n="settings.preset.ultra">Ultra</button>
    </div>

    <div class="setting-row" style="margin-top:15px; padding:12px; background:rgba(255,255,255,0.03); border-radius:12px; border:1px solid rgba(255,255,255,0.05);">
        <div style="display:flex; align-items:center; gap:8px;">
            <span style="font-size:16px;">🔋</span>
            <div class="setting-label" style="font-size:13px;" data-i18n="settings.label.energySaver">Économie d'énergie</div>
        </div>
        <input type="checkbox" id="energy-saver-toggle" aria-label="Économie d'énergie">
    </div>

    <div class="control-group" style="margin-top: 20px;">
        <div class="section-label" data-i18n="settings.section.rendering">Rendu 3D & Détails</div>
        
        <div class="setting-row">
            <div class="setting-label" data-i18n="settings.label.vegetation">Forêts & Végétation</div>
            <input type="checkbox" id="veg-toggle" checked aria-label="Forêts & Végétation">
        </div>
        <div style="margin-bottom: 15px; padding-left: 4px;">
            <div style="display: flex; justify-content: space-between; font-size: 10px; color: var(--text-3); margin-bottom: 4px;">
                <span data-i18n="settings.section.density">DENSITÉ DÉTAILS</span>
                <span id="veg-density-disp">4000</span>
            </div>
            <input type="range" id="veg-density-slider" min="0" max="15000" step="500" value="4000" aria-label="Densité végétation">
        </div>
        
        <div class="setting-row">
            <div class="setting-label" data-i18n="settings.label.hydrology">Lacs & Rivières</div>
            <input type="checkbox" id="hydro-toggle" checked aria-label="Lacs & Rivières">
        </div>
        <div class="setting-row">
            <div class="setting-label" data-i18n="settings.label.weather">Météo</div>
            <input type="checkbox" id="weather-toggle" checked aria-label="Météo">
        </div>
        <div style="margin-bottom: 15px; padding-left: 4px;">
            <div style="display: flex; justify-content: space-between; font-size: 10px; color: var(--text-3); margin-bottom: 4px;">
                <span data-i18n="weather.label.intensity">INTENSITÉ</span>
                <span id="weather-density-disp" style="font-family:var(--font-mono);">2500</span>
            </div>
            <input type="range" id="weather-density-slider" min="0" max="15000" step="500" value="2500" aria-label="Intensité météo">
        </div>
        <div style="margin-bottom: 15px; padding-left: 4px;">
            <div style="display: flex; justify-content: space-between; font-size: 10px; color: var(--text-3); margin-bottom: 4px;">
                <span data-i18n="weather.label.speed">VITESSE</span>
                <span id="weather-speed-disp" style="font-family:var(--font-mono);">1.0</span>
            </div>
            <input type="range" id="weather-speed-slider" min="0.5" max="3.0" step="0.1" value="1.0" aria-label="Vitesse météo">
        </div>
        <div class="setting-row">
            <div class="setting-label" data-i18n="settings.label.signposts">Signalisation 3D</div>
            <input type="checkbox" id="poi-toggle" checked aria-label="Signalisation 3D">
        </div>
    </div>

    <!-- Section PRO regroupée -->
    <div class="control-group settings-pro-section" style="margin-top: 20px; border: 1.5px solid var(--gold); border-radius: 12px; padding: 16px; background: rgba(255,215,0,0.03);">
        <div class="section-label" style="display: flex; align-items: center; gap: 8px; color: var(--gold);">
            <span style="font-size: 16px;">✨</span>
            <span data-i18n="settings.section.pro">Fonctionnalités PRO</span>
            <span class="pro-badge" style="font-size: 9px; background: var(--gold); color: #000; padding: 2px 8px; border-radius: 4px; font-weight: 700; margin-left: auto;">PRO</span>
        </div>
        <p style="font-size: 11px; color: var(--text-3); margin: 8px 0 12px 0; line-height: 1.5;" data-i18n="settings.pro.description">Débloquez toutes les fonctionnalités premium avec SunTrail Pro</p>
        
        <div class="setting-row pro-feature-row" id="row-buildings" style="cursor: pointer;">
            <div style="display: flex; align-items: center; gap: 10px; flex: 1;">
                <span style="font-size: 18px;">🏢</span>
                <div>
                    <div class="setting-label" data-i18n="settings.label.buildings">Bâtiments 3D</div>
                    <div style="font-size: 10px; color: var(--text-3);" data-i18n="settings.pro.buildingsDesc">Architecture réaliste sur le terrain</div>
                </div>
            </div>
            <span class="pro-badge" style="font-size: 9px; background: var(--gold); color: #000; padding: 2px 6px; border-radius: 4px; font-weight: 700;">PRO</span>
            <input type="checkbox" id="buildings-toggle" checked aria-label="Bâtiments OSM" style="margin-left: 8px;">
        </div>

        <div class="setting-row pro-feature-row" id="row-inclinometer" style="cursor: pointer;">
            <div style="display: flex; align-items: center; gap: 10px; flex: 1;">
                <span style="font-size: 18px;">📐</span>
                <div>
                    <div class="setting-label" data-i18n="settings.label.inclinometer">Inclinomètre</div>
                    <div style="font-size: 10px; color: var(--text-3);" data-i18n="settings.pro.inclinometerDesc">Pente du terrain en temps réel (°, %)</div>
                </div>
            </div>
            <span class="pro-badge" style="font-size: 9px; background: var(--gold); color: #000; padding: 2px 6px; border-radius: 4px; font-weight: 700;">PRO</span>
            <input type="checkbox" id="inclinometer-toggle" checked aria-label="Inclinomètre" style="margin-left: 8px;">
        </div>

        <div class="setting-row pro-feature-row" id="row-weather-pro" style="cursor: pointer;">
            <div style="display: flex; align-items: center; gap: 10px; flex: 1;">
                <span style="font-size: 18px;">🌡️</span>
                <div>
                    <div class="setting-label" data-i18n="settings.label.weatherPro">Météo Avancée</div>
                    <div style="font-size: 10px; color: var(--text-3);" data-i18n="settings.pro.weatherDesc">Graphique 24h + Prévisions 3 jours</div>
                </div>
            </div>
            <span class="pro-badge" style="font-size: 9px; background: var(--gold); color: #000; padding: 2px 6px; border-radius: 4px; font-weight: 700;">PRO</span>
            <input type="checkbox" id="weather-pro-toggle" aria-label="Météo Avancée" style="margin-left: 8px;">
        </div>

        <!-- Séparateur -->
        <div style="border-top: 1px solid rgba(255,215,0,0.12); margin: 12px 0 10px;"></div>
        <div style="font-size: 10px; color: var(--text-3); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;" data-i18n="settings.pro.includedLabel">Inclus avec Pro</div>

        <div class="setting-row pro-info-row" style="opacity: 0.7; padding: 4px 0;">
            <div style="display: flex; align-items: center; gap: 10px; flex: 1;">
                <span style="font-size: 18px;">🗓️</span>
                <div>
                    <div class="setting-label" data-i18n="settings.pro.solarCalLabel">Calendrier solaire</div>
                    <div style="font-size: 10px; color: var(--text-3);" data-i18n="settings.pro.solarCalDesc">Ombres pour n'importe quel jour de l'année</div>
                </div>
            </div>
            <span class="pro-check" style="font-size: 14px; color: var(--gold);">✓</span>
        </div>

        <div class="setting-row pro-info-row" style="opacity: 0.7; padding: 4px 0;">
            <div style="display: flex; align-items: center; gap: 10px; flex: 1;">
                <span style="font-size: 18px;">☀️</span>
                <div>
                    <div class="setting-label" data-i18n="settings.pro.solarAnalLabel">Analyse solaire Pro</div>
                    <div style="font-size: 10px; color: var(--text-3);" data-i18n="settings.pro.solarAnalDesc">Azimut, élévation, graphique 24h, phase lunaire</div>
                </div>
            </div>
            <span class="pro-check" style="font-size: 14px; color: var(--gold);">✓</span>
        </div>

        <div class="setting-row pro-info-row" style="opacity: 0.7; padding: 4px 0;">
            <div style="display: flex; align-items: center; gap: 10px; flex: 1;">
                <span style="font-size: 18px;">🗺️</span>
                <div>
                    <div class="setting-label" data-i18n="settings.pro.lodLabel">Zoom LOD 18 + Satellite</div>
                    <div style="font-size: 10px; color: var(--text-3);" data-i18n="settings.pro.lodDesc">Détail maximum — sentiers, bâtiments, végétation</div>
                </div>
            </div>
            <span class="pro-check" style="font-size: 14px; color: var(--gold);">✓</span>
        </div>
