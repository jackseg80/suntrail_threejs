<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SunTrail 3D — Randonnée Solaire</title>
  <meta name="description" content="Planifiez vos randonnées en 3D avec simulation d'ensoleillement en temps réel.">
  
  <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg">
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0f">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <canvas id="canvas-3d" aria-label="Carte 3D interactive"></canvas>
    <div id="ui-layer">
        
        <div id="top-status-bar" class="top-status-bar">
            <!-- Injecté par TopStatusBar.ts -->
        </div>

        <div id="floating-widgets">
            <div id="zoom-indicator" class="glass-pill" style="display:none;">LOD --</div>
            <div id="compass-container">
                <canvas id="compass-canvas" width="60" height="60" style="display:none;" aria-label="Boussole"></canvas>
            </div>
            <div id="location-btn" class="fab-btn" role="button" tabindex="0" aria-label="Ma position">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
            </div>
        </div>

        <div id="fab-stack">
            <button id="nav-layers-btn" class="fab-btn" aria-label="Fonds de carte">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
            </button>
            <button id="nav-2d-toggle" class="fab-btn" aria-label="Basculer 2D/3D" aria-pressed="false">
                <span class="nav-mode-label">3D</span>
            </button>
        </div>

        <div id="center-reticle" aria-hidden="true">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" style="filter: drop-shadow(0 0 2px rgba(0,0,0,0.5));">
                <circle cx="12" cy="12" r="1" fill="white"/>
                <path d="M12 4v4m0 8v4M4 12h4m8 0h4" stroke-linecap="round"/>
            </svg>
        </div>

        <div id="sheet-overlay" class="sheet-overlay"></div>
        <div id="sheet-container">
            <!-- Les Sheets (Settings, Search, etc.) sont injectées ici dynamiquement -->
        </div>

        <nav id="nav-bar" class="nav-bar">
            <!-- Injecté par NavigationBar.ts -->
        </nav>

        <div id="toast-container" aria-live="assertive"></div>
    </div>
  </div>

  <div id="onboarding-container"></div>
  <div id="loading-screen">
    <div class="loader-content">
        <div class="loader-logo">
            <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 2L12 12L22 12" stroke-linecap="round"/>
                <path d="M12 22L12 12" stroke-linecap="round"/>
            </svg>
        </div>
        <div class="loader-title">SunTrail 3D</div>
        <div class="loader-bar"><div id="loader-progress"></div></div>
        <div class="loader-status" id="loader-status">Initialisation du moteur...</div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
