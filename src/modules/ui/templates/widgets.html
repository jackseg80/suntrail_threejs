<div id="widgets-inner-container">
    <div id="bottom-stack">
        <div id="bottom-bar">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="display:flex; align-items:center; gap:12px;">
                    <div style="font-weight:700; font-size:18px;"><span id="time-disp">12:00</span></div>
                    <div id="sun-phase" style="font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-left:5px;">☀️ Plein jour</div>
                    <input type="date" id="date-input" style="font-size:12px; padding:8px 12px; border-radius:10px; cursor:pointer; font-family: inherit; -webkit-appearance: none; display: flex; align-items: center; min-height: 35px;">
                </div>
                <div style="display:flex; gap:10px;">
                    <button id="play-btn" style="background:none; border:none; color:var(--text); font-size:18px; cursor:pointer;">▶</button>
                    <select id="speed-select" style="background:none; border:none; color:var(--text-2); font-size:12px;">
                        <option value="1">1x</option>
                        <option value="5">5x</option>
                        <option value="10">10x</option>
                    </select>
                </div>
            </div>
            <input type="range" id="time-slider" min="0" max="1439" value="720" aria-label="Heure de simulation">
        </div>
    </div>
    <div id="elevation-profile">
        <div class="profile-drag-handle">
            <div class="sheet-drag-indicator"></div>
            <div style="display:flex; justify-content:space-between; align-items:center; width:100%; padding:0 4px;">
                <h3 style="margin:0; font-size:12px; color:var(--gold); text-transform:uppercase; letter-spacing:2px;">📈 Profil d'élévation & Pentes</h3>
                <div style="display:flex; align-items:center; gap:15px;">
                    <div id="profile-info" style="font-size:11px; color:var(--text-2); font-family:monospace;">Distance : 0km | Alt : 0m | Pente : 0%</div>
                    <button id="close-profile" style="background:rgba(255,255,255,0.05); border:1px solid var(--border); color:white; width:24px; height:24px; border-radius:50%; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center;">&times;</button>
                </div>
            </div>
        </div>
        <div id="profile-chart-container" style="position:relative; width:100%; height:80px; background:rgba(255,255,255,0.02); border-radius:12px; overflow:hidden; cursor:crosshair; border:1px solid rgba(255,255,255,0.05);">
            <svg id="profile-svg" style="width:100%; height:100%;"></svg>
            <div id="profile-cursor" style="display:none; position:absolute; top:0; height:100%; width:2px; background:cyan; pointer-events:none; box-shadow:0 0 10px cyan;"></div>
        </div>
    </div>
</div>
