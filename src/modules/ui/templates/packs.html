<div id="packs" class="bottom-sheet">
    <div class="sheet-drag-handle" aria-hidden="true"><div class="sheet-drag-indicator"></div></div>
    <div class="sheet-header">
        <span class="sheet-title" data-i18n="packs.title">Packs Pays</span>
        <div class="sheet-close" id="close-packs">&times;</div>
    </div>

    <div id="packs-storage-info" class="stat-card" style="margin-bottom:var(--space-4); padding:var(--space-3);">
        <div class="stat-card-label" data-i18n="packs.storage">Stockage</div>
        <div class="stat-card-value" id="packs-storage-value">-- MB</div>
    </div>

    <div id="packs-list"></div>

    <div style="text-align:center; margin-top:var(--space-4); font-size:var(--text-xs); color:var(--text-3);" data-i18n="packs.lodInfo">
        Pro : LOD 12-14 &middot; Gratuit : LOD 12
    </div>

    <button id="packs-restore-btn" class="btn-go" style="margin-top:var(--space-3); background:transparent; border:1px solid var(--text-3); color:var(--text-2); font-size:var(--text-xs);" data-i18n="packs.btn.restore">
        Restaurer les achats
    </button>
</div>
