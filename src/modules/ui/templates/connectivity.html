<div id="connectivity" class="bottom-sheet">
<div class="sheet-drag-handle" aria-hidden="true"><div class="sheet-drag-indicator"></div></div>
<div class="sheet-header">
<span class="sheet-title" data-i18n="connectivity.title">Système & Données</span>
<div class="sheet-close" id="close-connectivity">×</div>
</div>

<div class="section-label" data-i18n="connectivity.section.signal">État du Signal</div>
<div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;">
<div class="stat-card">
<div class="stat-card-label" data-i18n="connectivity.label.gpsAccuracy">Signal GPS</div>
<div class="stat-card-value" id="gps-accuracy">-- <span style="font-size:12px; color:var(--text-3)">m</span></div>
</div>
<div class="stat-card">
<div class="stat-card-label" data-i18n="connectivity.label.network">Réseau</div>
<div class="stat-card-value" id="net-status">ONLINE</div>
<div class="stat-card-sub" id="net-connection-type"></div>
</div>
</div>

<div class="setting-row" style="margin-bottom:20px; padding:12px; background:rgba(59,126,248,0.05); border-radius:12px; border:1px solid rgba(59,126,248,0.1);">
<div style="display:flex; align-items:center; gap:10px;">
<span style="font-size:18px;">✈️</span>
<div>
    <div class="setting-label" style="font-size:14px;" data-i18n="connectivity.label.offlineMode">Mode Hors-ligne</div>
    <div style="font-size:10px; color:var(--text-3);" data-i18n="connectivity.label.offlineHint">Forcer l'usage du cache uniquement</div>
</div>
</div>
<input type="checkbox" id="offline-toggle" aria-label="Mode Hors-ligne">
</div>

<div class="control-group">
<div class="section-label" data-i18n="connectivity.section.cache">Gestion du Cache</div>
<div style="display:flex; gap:8px; margin-bottom:15px;">
<button id="conn-clear-cache" class="btn-go" style="margin:0; padding:12px; background:#b91c1c; flex:1; font-size:12px;" data-i18n="connectivity.btn.clearCache">Vider le Cache</button>
<button id="conn-download-zone" class="btn-go" style="margin:0; padding:12px; flex:1; font-size:12px;"><span data-i18n="connectivity.btn.downloadZone">Télécharger Zone</span></button>
</div>

<div class="setting-row">
<div class="setting-label" data-i18n="connectivity.label.pmtiles">Stockage local (.pmtiles)</div>
<button id="conn-pmtiles-btn" class="icon-btn-sm" style="border:none; background:rgba(255,255,255,0.05);">📂</button>
<input type="file" id="conn-pmtiles-upload" accept=".pmtiles" style="display:none;">
</div>

<button id="conn-packs-btn" class="btn-go" style="margin:var(--space-2) 0; padding:var(--space-3); width:100%; font-size:var(--text-sm); background:rgba(59,126,248,0.1); color:var(--accent, #3b7ef8); border:1px solid rgba(59,126,248,0.2);" data-i18n="packs.title">Packs Pays</button>
</div>

<div class="control-group" style="margin-top:10px;">
<div class="section-label" data-i18n="connectivity.section.external">Services Externes</div>
<div id="conn-api-key-slot"></div>
</div>
</div>
