<div id="sos" class="bottom-sheet">
    <div class="sheet-drag-handle" aria-hidden="true"><div class="sheet-drag-indicator"></div></div>
    <div style="text-align:center; padding:20px;">
        <div style="font-size:48px; margin-bottom:15px;">🆘</div>
        <h2 style="color:#ef4444; margin:0 0 10px 0;" data-i18n="sos.title">URGENCE SOS</h2>
        <p style="font-size:13px; color:var(--text-2); margin-bottom:20px;" data-i18n="sos.subtitle">Voici vos coordonnées exactes à transmettre aux secours.</p>
        <div id="sos-text-container" style="background:rgba(239,68,68,0.1); border:1px solid #ef4444; border-radius:16px; padding:20px; font-family:monospace; font-size:16px; color:var(--text); margin-bottom:20px; word-break:break-all;">
            <span data-i18n="sos.locating">⌛ Localisation en cours...</span>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:8px;">
            <button id="sos-copy-btn" class="track-btn primary" style="flex:1;" data-i18n="sos.copy">Copier</button>
            <button id="sos-sms-btn" class="track-btn primary" style="flex:1; background:#15803d;" disabled data-i18n="sos.sms">SMS</button>
        </div>
        <button id="sos-close-btn" class="track-btn" style="width:100%; background:rgba(255,255,255,0.05);" data-i18n="sos.close">Fermer</button>
    </div>
</div>
